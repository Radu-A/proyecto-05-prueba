<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title th:text="${titulo}"></title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
</head>
<body>
	<header>
		<nav class="navbar navbar-expand-lg bg-body-tertiary">
			<div class="container-fluid">
				<a th:text="${titulo}" class="navbar-brand" th:href="@{/home}"></a>
				<button class="navbar-toggler" type="button"
					data-bs-toggle="collapse" data-bs-target="#navbarNav"
					aria-controls="navbarNav" aria-expanded="false"
					aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav">
						<li class="nav-item"><a class="nav-link active"
							aria-current="page" href="#">Loto</a></li>
						<li class="nav-item"><a class="nav-link" href="#">Libros</a>
						</li>
						<li class="nav-item"><a class="nav-link" href="#">Imágenes</a>
						</li>
					</ul>
				</div>
			</div>
		</nav>
	</header>
	<main class="container-sm p-4">
		<section class="container-sm p-4">
			<img alt="" th:src="@{img/logo.jpg}"
				class="rounded mx-auto d-block w-25">
			<h1 th:text="${cabecera}"></h1>
		</section>

		<section>
			<table class="table">
				<tbody>
					<tr>
						<th scope="row">1</th>
						<td><a th:href="@{/loto/genera/49/6/spain}">Loto Española — 6 de 49</a></td>
					</tr>
					<tr>
						<th scope="row">2</th>
						<td><a th:href="@{/loto/genera/49/6/germany}">Loto Alemana — 6 de 49</a></td>
					</tr>
					<tr>
						<th scope="row">3</th>
						<td><a th:href="@{/loto/genera/90/6/france}">Loto Francesa — 6 de 90</a></td>
					</tr>
					<tr>
						<th scope="row">3</th>
						<td><a th:href="@{/loto/genera/49/5/italy}">Loto Italiana — 5 de 49</a></td>
					</tr>
				</tbody>
			</table>
		</section>

	</main>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>
</html>
