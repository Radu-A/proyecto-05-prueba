<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title th:text="${titulo}"></title>
	<link href="/styles/style.css" rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
	<header>
		<nav class="navbar navbar-expand-lg bg-body-tertiary">
			<div class="container-fluid">
				<a th:text="${titulo}" class="navbar-brand" th:href="@{/home}"></a>
				<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
					aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNav">
					<ul class="navbar-nav">
						<li class="nav-item"><a class="nav-link" aria-current="page" th:href="@{/loto/menu}">Loto</a>
						</li>
						<li class="nav-item"><a class="nav-link" th:href="@{/libros/menu}">Libros</a>
						</li>
						<li class="nav-item"><a class="nav-link" th:href="@{/imagenes/menu}">Imágenes</a>
						</li>
					</ul>
				</div>
			</div>
		</nav>
	</header>
	<main>
		<section>
		<h1 th:text="${cabecera}"></h1>
			<img alt="" th:src="@{../img/logo.jpg}" class="rounded mx-auto d-block w-25">
		</section>

		<section>
			<a th:href="@{'/libros/menu'}">← Volver</a>
			<ul>
				<li>
					<p>
						Id: <span th:text="${libro.id}"></span>
					</p>
				</li>
				<li>
					<p>
						Título: <span th:text="${libro.titulo}"></span>
					</p>
				</li>
				<li>
					<p>
						Ejemplares: <span th:text="${libro.ejemplares}"></span>
					</p>
				</li>
				<li>
					<p>
						Género: <span th:text="${libro.genero}"></span>
					</p>
				</li>
			</ul>
		</section>


	</main>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
</body>

</html>
